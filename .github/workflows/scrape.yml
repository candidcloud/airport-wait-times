name: Update Wait Times

# Tells GitHub when to run the script
on:
  schedule:
    # Runs every 15 minutes automatically
    - cron: '*/15 * * * *'
  # Allows you to manually click a "Run" button in the GitHub UI
  workflow_dispatch: 

permissions:
  # Required to allow the bot to save the data.json file back to the repository
  contents: write 

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        # Since we use the direct API now, we only need the basic requests library
        run: pip install requests

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          # Set up a generic bot identity for the commit history
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the newly generated data file
          git add data.json
          
          # Only commit and push if the data actually changed (prevents empty spam commits)
          git diff --quiet && git diff --staged --quiet || git commit -m "Update wait times"
          git push