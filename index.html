<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Security Wait Times</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0263e0">
    
    <link rel="apple-touch-icon" href="./plane72x72.png">

    <style>
        :root {
            --primary: #0263e0;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --green: #38a169;
            --yellow: #d69e2e;
            --red: #e53e3e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            text-transform: uppercase;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2, 99, 224, 0.2);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #024eb0;
        }

        .loader {
            text-align: center;
            color: var(--text-muted);
            display: none;
            font-weight: 500;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkpoint-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .checkpoint-name {
            font-weight: 600;
            font-size: 16px;
        }

        .wait-time {
            font-weight: 700;
            font-size: 18px;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            white-space: nowrap;
        }

        .status-good { background-color: var(--green); }
        .status-moderate { background-color: var(--yellow); }
        .status-severe { background-color: var(--red); }

        .error-msg {
            color: var(--red);
            text-align: center;
            font-weight: 500;
        }

        .timestamp {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✈️ Airport Wait Times</h1>
    <div class="search-box">
        <input type="text" id="airportCode" placeholder="Enter Airport Code (e.g. PHX)" maxlength="3">
        <button onclick="lookupWaitTimes()">Search</button>
    </div>

    <div id="loader" class="loader">Fetching latest times...</div>
    <div id="results" class="results">
        </div>
    <div id="lastUpdated" class="timestamp"></div>
</div>

<script>
    // 1. Function to handle the search click
    async function lookupWaitTimes() {
        const inputField = document.getElementById('airportCode');
        const code = inputField.value.trim().toUpperCase();
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');
        const timestampDiv = document.getElementById('lastUpdated');

        if (code.length !== 3) {
            resultsDiv.innerHTML = '<div class="error-msg">Please enter a valid 3-letter airport code.</div>';
            timestampDiv.style.display = 'none';
            return;
        }

        // Clear previous results and show loader
        resultsDiv.innerHTML = '';
        timestampDiv.style.display = 'none';
        loader.style.display = 'block';

        try {
            // Fetch the entire static database JSON file
            const database = await fetchStaticData();
            loader.style.display = 'none';

            if (!database || !database[code] || database[code].length === 0) {
                resultsDiv.innerHTML = `<div class="error-msg">No wait time data found for ${code}.</div>`;
                return;
            }

            // Save the successful search to the phone's memory
            localStorage.setItem('savedAirportCode', code);

            // Render the data for the specific airport
            const airportData = database[code];
            airportData.forEach(checkpoint => {
                const card = document.createElement('div');
                card.className = 'checkpoint-card';
                
                // Parse wait minutes as an integer to determine color
                const minutes = parseInt(checkpoint.waitMinutes, 10) || 0;
                let statusClass = 'status-good';
                if (minutes > 15) statusClass = 'status-moderate';
                if (minutes > 30) statusClass = 'status-severe';

                card.innerHTML = `
                    <span class="checkpoint-name">${checkpoint.name}</span>
                    <span class="wait-time ${statusClass}">${checkpoint.waitMinutes} min</span>
                `;
                resultsDiv.appendChild(card);
            });

            // Display the last updated timestamp if it exists in the JSON
            if (database.LAST_UPDATED) {
                const updateTime = new Date(database.LAST_UPDATED);
                timestampDiv.innerText = `Last updated: ${updateTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                timestampDiv.style.display = 'block';
            }

        } catch (error) {
            loader.style.display = 'none';
            resultsDiv.innerHTML = '<div class="error-msg">An error occurred while fetching data.</div>';
            console.error(error);
        }
    }

    // 2. Fetch the static JSON file generated by GitHub Actions
    async function fetchStaticData() {
        try {
            // Add "?t=" with the current time so the phone doesn't load a stale, cached version
            const response = await fetch(`./data.json?t=${new Date().getTime()}`);
            if (!response.ok) throw new Error("Network response was not ok");
            return await response.json();
        } catch (error) {
            console.error("Error loading data.json:", error);
            return null;
        }
    }

    // Add 'Enter' key support for the input field
    document.getElementById('airportCode').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            lookupWaitTimes();
        }
    });

    // 3. Register the Service Worker for offline PWA support
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('ServiceWorker registration successful');
                })
                .catch((err) => {
                    console.log('ServiceWorker registration failed: ', err);
                });
        });
    }

    // 4. Auto-load the last searched airport when the app opens
    window.addEventListener('DOMContentLoaded', () => {
        const savedCode = localStorage.getItem('savedAirportCode');
        if (savedCode) {
            document.getElementById('airportCode').value = savedCode;
            // Add a tiny delay so the UI can render before the fetch begins
            setTimeout(lookupWaitTimes, 100); 
        }
    });
</script>

</body>
</html>
