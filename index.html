<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Security Wait Times</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0263e0">
    
    <link rel="apple-touch-icon" href="./plane72x72.png">

    <style>
        :root {
            --primary: #0263e0;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --green: #38a169;
            --yellow: #d69e2e;
            --red: #e53e3e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            text-transform: uppercase;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2, 99, 224, 0.2);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #024eb0;
        }

        .loader {
            text-align: center;
            color: var(--text-muted);
            display: none;
            font-weight: 500;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkpoint-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .checkpoint-name {
            font-weight: 600;
            font-size: 16px;
        }

        .wait-time {
            font-weight: 700;
            font-size: 18px;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            white-space: nowrap;
        }

        .status-good { background-color: var(--green); }
        .status-moderate { background-color: var(--yellow); }
        .status-severe { background-color: var(--red); }

        .error-msg {
            color: var(--red);
            text-align: center;
            font-weight: 500;
        }

        .timestamp {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 20px;
            display: none;
        }

        .available-airports {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .airport-tag {
            background-color: #e2e8f0;
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .airport-tag:hover {
            background-color: #cbd5e0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✈️ Airport Wait Times</h1>
    <div class="search-box">
        <input type="text" id="airportCode" placeholder="Enter Airport Code (e.g. PHX)" maxlength="3">
        <button onclick="lookupWaitTimes()">View</button>
    </div>

    <div id="availableAirports" class="available-airports"></div>

    <div id="loader" class="loader">Fetching latest times...</div>
    <div id="results" class="results"></div>
    <div id="lastUpdated" class="timestamp"></div>
</div>

<script>
    // Handle the search functionality
    async function lookupWaitTimes() {
        const inputField = document.getElementById('airportCode');
        const code = inputField.value.trim().toUpperCase();
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');
        const timestampDiv = document.getElementById('lastUpdated');

        if (code.length !== 3) {
            resultsDiv.innerHTML = '<div class="error-msg">Please enter a valid 3-letter airport code.</div>';
            timestampDiv.style.display = 'none';
            return;
        }

        // Reset UI state before fetching
        resultsDiv.innerHTML = '';
        timestampDiv.style.display = 'none';
        loader.style.display = 'block';

        try {
            // Retrieve the static JSON file
            const database = await fetchStaticData();
            loader.style.display = 'none';

            // Verify the fetch request returned data
            if (!database) {
                resultsDiv.innerHTML = '<div class="error-msg">Could not connect to the database.</div>';
                return;
            }

            // Access the specific airport object
            const airportEntry = database[code];
            
            // Verify the airport exists and contains checkpoint data
            if (!airportEntry || !airportEntry.data || airportEntry.data.length === 0) {
                resultsDiv.innerHTML = `<div class="error-msg">No wait time data found for ${code}.</div>`;
                return;
            }

            // Save the valid search code to local storage
            localStorage.setItem('savedAirportCode', code);

            // Render the checkpoint data elements
            const airportData = airportEntry.data;
            airportData.forEach(checkpoint => {
                const card = document.createElement('div');
                card.className = 'checkpoint-card';
                
                // Determine CSS class based on wait duration
                const minutes = parseInt(checkpoint.waitMinutes, 10) || 0;
                let statusClass = 'status-good';
                if (minutes > 15) statusClass = 'status-moderate';
                if (minutes > 30) statusClass = 'status-severe';

                card.innerHTML = `
                    <span class="checkpoint-name">${checkpoint.name}</span>
                    <span class="wait-time ${statusClass}">${checkpoint.waitMinutes} min</span>
                `;
                resultsDiv.appendChild(card);
            });

            // Display both the specific data timestamp and the global check timestamp
            let timeText = '';
            
            // 1. When the data was last successfully received
            if (airportEntry.last_updated) {
                const dataTime = new Date(airportEntry.last_updated);
                timeText += `<strong>Data Received:</strong> ${dataTime.toLocaleString([], {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'})}<br>`;
            }
            
            // 2. When the bot last attempted to check for updates
            if (database.LAST_UPDATED) {
                const checkTime = new Date(database.LAST_UPDATED);
                timeText += `<strong>Last Checked:</strong> ${checkTime.toLocaleString([], {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'})}`;
            }

            if (timeText) {
                timestampDiv.innerHTML = timeText;
                timestampDiv.style.display = 'block';
                // Optional: Add a little line height so they aren't squished
                timestampDiv.style.lineHeight = '1.6'; 
            }

        } catch (error) {
            loader.style.display = 'none';
            resultsDiv.innerHTML = '<div class="error-msg">An error occurred while loading data.</div>';
            console.error(error);
        }
    }

    // Fetch the JSON file generated by the backend
    async function fetchStaticData() {
        try {
            // Append current timestamp to bypass browser caching
            const response = await fetch(`./data.json?t=${new Date().getTime()}`);
            if (!response.ok) throw new Error("Network response was not ok");
            return await response.json();
        } catch (error) {
            console.error("Error loading data.json:", error);
            return null;
        }
    }

    // Scan the database and generate clickable tags for airports that have data
    async function loadAvailableAirports() {
        const database = await fetchStaticData();
        const container = document.getElementById('availableAirports');
        
        if (!database) return;

        // Get all keys, filter out the timestamp, and sort them alphabetically
        const codes = Object.keys(database)
            .filter(key => key !== 'LAST_UPDATED')
            .sort(); 
        
        codes.forEach(code => {
            const entry = database[code];
            
            // Only create a button if this specific airport currently has data
            if (entry && entry.data && entry.data.length > 0) {
                const tag = document.createElement('span');
                tag.className = 'airport-tag';
                tag.innerText = code;
                
                // Make the tag clickable so it auto-fills and searches
                tag.onclick = () => {
                    document.getElementById('airportCode').value = code;
                    lookupWaitTimes();
                };
                
                container.appendChild(tag);
            }
        });
    }

    // Listen for the Enter key in the input field
    document.getElementById('airportCode').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            lookupWaitTimes();
        }
    });

    // Register the Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('ServiceWorker registration successful');
                })
                .catch((err) => {
                    console.log('ServiceWorker registration failed: ', err);
                });
        });
    }

    // Load the tags and the previously searched airport on application start
    window.addEventListener('DOMContentLoaded', () => {
        loadAvailableAirports();
        
        const savedCode = localStorage.getItem('savedAirportCode');
        if (savedCode) {
            document.getElementById('airportCode').value = savedCode;
            setTimeout(lookupWaitTimes, 100); 
        }
    });
</script>

</body>
</html>
